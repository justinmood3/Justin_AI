<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>
</head>
<body>
    <h2>AI Chat</h2>

    <form method="POST">
        <input name="message" placeholder="Type message..." required>
        <button type="submit">Send</button>
    </form>

    <hr>

    {% for sender, msg in chat %}
        <p><b>{{ sender }}:</b> {{ msg }}</p>
    {% endfor %}
</body>
</html>
